apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iaiso.fullname" . }}
  labels:
    {{- include "iaiso.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "iaiso.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "iaiso.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/policy: {{ .Values.policy.contents | sha256sum }}
    spec:
      serviceAccountName: {{ include "iaiso.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: iaiso
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args: {{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          env:
            - name: IAISO_REDIS_URL
              value: {{ .Values.redis.url | quote }}
            {{- if .Values.redis.passwordSecretRef.name }}
            - name: IAISO_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.passwordSecretRef.name }}
                  key:  {{ .Values.redis.passwordSecretRef.key }}
            {{- end }}
            {{- if .Values.oidc.discoveryUrl }}
            - name: IAISO_OIDC_DISCOVERY_URL
              value: {{ .Values.oidc.discoveryUrl | quote }}
            - name: IAISO_OIDC_AUDIENCE
              value: {{ .Values.oidc.audience | quote }}
            {{- end }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.exporterOtlpEndpoint | quote }}
            {{- end }}
          volumeMounts:
            - name: policy
              mountPath: /etc/iaiso
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "from iaiso.policy import dump_policy_template; import tempfile, os; f = tempfile.mktemp(suffix='.yaml'); dump_policy_template(f); os.unlink(f)"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import iaiso; print('ok')"
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: policy
          configMap:
            name: {{ include "iaiso.fullname" . }}-policy
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
