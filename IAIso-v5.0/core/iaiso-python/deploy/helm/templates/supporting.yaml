{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "iaiso.serviceAccountName" . }}
  labels:
    {{- include "iaiso.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iaiso.fullname" . }}
  labels:
    {{- include "iaiso.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "iaiso.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iaiso.fullname" . }}-policy
  labels:
    {{- include "iaiso.labels" . | nindent 4 }}
data:
  policy.yaml: |-
    {{- if .Values.policy.contents }}
    {{- .Values.policy.contents | nindent 4 }}
    {{- else }}
    version: "1"
    pressure:
      token_coefficient: 0.015
      tool_coefficient: 0.08
      escalation_threshold: 0.85
      release_threshold: 0.95
    coordinator:
      escalation_threshold: 5.0
      release_threshold: 8.0
      aggregator: sum
    consent:
      issuer: "iaiso"
      default_ttl_seconds: 3600
    {{- end }}
{{- if .Values.metrics.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "iaiso.fullname" . }}
  {{- with .Values.metrics.serviceMonitor.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "iaiso.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "iaiso.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      path: /metrics
{{- end }}
{{- if .Values.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "iaiso.fullname" . }}
  labels:
    {{- include "iaiso.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "iaiso.selectorLabels" . | nindent 6 }}
{{- end }}
