# Local development stack for IAIso.
#
# Runs:
#   - Redis for the distributed coordinator
#   - Prometheus scraping /metrics from a sample coordinator service
#
# This is intended for integration testing your application against a
# full IAIso stack locally. It is NOT a production deployment.

version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - coordinator

  coordinator:
    # Build the IAIso image from the repository root.
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    # Placeholder: replace with your actual coordinator service command.
    # The CLI's `coordinator demo` is only a smoke test.
    command: ["coordinator", "demo"]

